name: Build Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le projet
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Compiler
        run: mvn package

      - name: Envoyer le JAR
        uses: actions/upload-artifact@v4
        with:
          name: IdentityStealer
          path: target/*.jar
